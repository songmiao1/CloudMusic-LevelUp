name: Daily Cloud Music Sign-In
on:
  schedule:
    # GitHub Actions uses UTC. 07:17 Asia/Shanghai = 23:17 UTC (previous day).
    - cron: '17 23 * * *'
  workflow_dispatch:
jobs:
  signin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npm install
      - name: Execute sign-in
        env:
          NETEASE_USER_ID: ${{ secrets.NETEASE_USER_ID }}
          NETEASE_COOKIE: ${{ secrets.NETEASE_COOKIE }}
        run: |
          python signin.py
      - name: Execute extended tasks
        env:
          NETEASE_USER_ID: ${{ secrets.NETEASE_USER_ID }}
          NETEASE_COOKIE: ${{ secrets.NETEASE_COOKIE }}
        run: |
          npm run tasks
