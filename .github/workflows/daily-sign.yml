name: Daily Cloud Music Sign-In
on:
 schedule:
 - cron: '0 2 * * *'
 workflow_dispatch:
jobs:
 signin:
 runs-on: ubuntu-latest
 steps:
 - name: Checkout code
 uses: actions/checkout@v4
 - name: Set up Python
 uses: actions/setup-python@v5
 with:
 python-version: '3.11'
 - name: Install dependencies
 run: |
 python -m pip install --upgrade pip
 pip install -r requirements.txt
 - name: Execute sign-in
 env:
 NETEASE_USER_ID: ${{ secrets.NETEASE_USER_ID }}
 NETEASE_COOKIE: ${{ secrets.NETEASE_COOKIE }}
 run: |
 python signin.py
