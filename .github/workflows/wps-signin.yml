name: WPS Daily

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # GitHub Actions uses UTC. 07:00 Asia/Shanghai = 23:00 UTC (previous day).
    - cron: "0 23 * * *"
  workflow_dispatch:

concurrency:
  group: wps-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: wps-github-action/requirements.txt

      - name: Install dependencies
        run: pip install -r wps-github-action/requirements.txt

      - name: Run WPS task
        env:
          TZ: Asia/Shanghai
          WPS_TASK_CK: ${{ secrets.WPS_TASK_CK }}
          WPS_HTTP_PROXY: ${{ secrets.WPS_HTTP_PROXY }}
          WPS_HTTPS_PROXY: ${{ secrets.WPS_HTTPS_PROXY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_NAME: ${{ secrets.SMTP_NAME }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python wps-github-action/scripts/wps.py
